# JM Tally — Web App (Node Web Service)
# Serves the production SPA with `serve` after Vite build.
# Dashboard: New → Blueprint → connect repo, or New → Web Service (Node):
#   Build:  npm install && npm run build
#   Start:  npm start
# Set VITE_ANTHROPIC_API_KEY in Environment (build-time) if you use AI chat.

services:
  - type: web
    name: jm-tally
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_ANTHROPIC_API_KEY
        sync: false
