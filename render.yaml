# JM Tally — Web App (Node Web Service)
# Default AI: OpenAI — set OPENAI_API_KEY from https://platform.openai.com/api-keys
# npm start proxies /api/openai + /api/anthropic; CHAT_PROVIDER=anthropic for Claude-only.
# Use a Web Service with `npm start` — Static Site will not run server.mjs.

services:
  - type: web
    name: jm-tally
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: CHAT_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: VITE_OPENAI_API_KEY
        sync: false
      - key: OPENAI_CHAT_MODEL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: VITE_ANTHROPIC_API_KEY
        sync: false
      - key: VITE_CHAT_PROVIDER
        sync: false
