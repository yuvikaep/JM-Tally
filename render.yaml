# JM Tally — Web App (Node Web Service)
# `node server.mjs` serves dist/ and injects VITE_ANTHROPIC_API_KEY into HTML at runtime (no rebuild when key changes).
# Dashboard: New → Blueprint → connect repo, or New → Web Service (Node):
#   Build:  npm install && npm run build
#   Start:  npm start
# AI chat: set ANTHROPIC_API_KEY or VITE_ANTHROPIC_API_KEY for runtime (npm start injects + /api proxy).
# Use a Web Service with `npm start` — Static Site will not run server.mjs and chat will need a browser key.

services:
  - type: web
    name: jm-tally
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    # serve must bind 0.0.0.0:$PORT — plain -l $PORT listens on localhost only (Render times out)
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_ANTHROPIC_API_KEY
        sync: false
