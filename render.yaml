# JM Tally — Web App (Node). AI chat: OPENAI_API_KEY from https://platform.openai.com/api-keys
# npm start → server.mjs serves dist + /api/openai proxy

services:
  - type: web
    name: jm-tally
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: OPENAI_API_KEY
        sync: false
      - key: VITE_OPENAI_API_KEY
        sync: false
      - key: OPENAI_CHAT_MODEL
        sync: false
